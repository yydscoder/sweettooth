<!DOCTYPE html>
<html>
<head>
    <title>Cart Test</title>
    <style>
        .cart-item-row { padding: 10px; border: 1px solid #ccc; margin: 5px 0; }
        .cart-qty-btn { width: 30px; height: 30px; font-size: 18px; cursor: pointer; }
        .cart-remove-btn { background: #f33; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Cart Button Test</h1>
    <div id="cart-items-list"></div>
    
    <script>
    // Test cart data
    var cart = [
        { product: 'Test Product 1', quantity: 2 },
        { product: 'Test Product 2', quantity: 1 }
    ];
    
    // Render cart items
    function renderCart() {
        var list = document.getElementById('cart-items-list');
        list.innerHTML = '';
        
        for (var j = 0; j < cart.length; j++) {
            var item = cart[j];
            var row = document.createElement('div');
            row.className = 'cart-item-row';
            row.innerHTML =
                '<div class="cart-item-name">' + item.product + '</div>' +
                '<div class="cart-item-controls">' +
                  '<button class="cart-qty-btn cart-qty-minus" data-product="' + item.product + '">-</button>' +
                  '<span class="cart-qty-value">' + item.quantity + '</span>' +
                  '<button class="cart-qty-btn cart-qty-plus" data-product="' + item.product + '">+</button>' +
                '</div>' +
                '<button class="cart-remove-btn" data-product="' + item.product + '" title="Remove">Remove</button>';
            list.appendChild(row);
        }
    }
    
    // Update quantity
    function updateCartQuantity(productName, delta) {
        console.log('updateCartQuantity called:', productName, delta);
        for (var i = 0; i < cart.length; i++) {
            if (cart[i].product === productName) {
                cart[i].quantity += delta;
                if (cart[i].quantity <= 0) {
                    cart.splice(i, 1);
                }
                break;
            }
        }
        renderCart();
    }
    
    // Remove from cart
    function removeFromCart(productName) {
        console.log('removeFromCart called:', productName);
        cart = cart.filter(function(i) { return i.product !== productName; });
        renderCart();
    }
    
    // Event listener - EXACT copy from cart.js
    document.addEventListener('click', function(e) {
        var btn = e.target;
        console.log('Click detected:', btn.className, btn.tagName);
        
        // Handle cart quantity buttons
        if (btn.classList.contains('cart-qty-minus')) {
            console.log('MATCHED cart-qty-minus');
            e.stopPropagation();
            e.preventDefault();
            var product = btn.getAttribute('data-product');
            if (product) updateCartQuantity(product, -1);
            return;
        }
        if (btn.classList.contains('cart-qty-plus')) {
            console.log('MATCHED cart-qty-plus');
            e.stopPropagation();
            e.preventDefault();
            var product = btn.getAttribute('data-product');
            if (product) updateCartQuantity(product, 1);
            return;
        }
        
        // Handle remove buttons
        if (btn.classList.contains('cart-remove-btn')) {
            console.log('MATCHED cart-remove-btn');
            e.stopPropagation();
            e.preventDefault();
            var product = btn.getAttribute('data-product');
            if (product) removeFromCart(product);
            return;
        }
    }, true); // useCapture=true
    
    // Initial render
    renderCart();
    </script>
</body>
</html>
